spring.application.name=tenant-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=8083

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/smartroomms}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.pool-name=${spring.application.name}-hikari
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.generate_statistics=false

jwt.secret=${JWT_SECRET:PFcsHTkldAnWhsoeeH/fHoKgext6EhZMp1sJYAnHqRA=}
jwt.expiration=${JWT_EXPIRATION:86400000}
rental.invite.secret=${RENTAL_INVITE_SECRET:uIHGLb0gTTc7Mw2RExf2zW83pQYa9J8G2R5lE4PhR3s=}
rental.invite.expiration-hours=${RENTAL_INVITE_EXPIRATION_HOURS:72}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dbj3kf54f}
cloudinary.api-key=${CLOUDINARY_API_KEY:161871263642373}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:5qNcCOZlfiGL2hL9M6XRZ61JLQY}

logging.file.name=logs/tenant-service.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,httpexchanges
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.observations.key-values.application=${spring.application.name}
