spring.application.name=auth-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=8081

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/smartroomms}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.pool-name=${spring.application.name}-hikari
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.generate_statistics=false
spring.sql.init.mode=always

jwt.secret=${JWT_SECRET:PFcsHTkldAnWhsoeeH/fHoKgext6EhZMp1sJYAnHqRA=}
jwt.expiration=${JWT_EXPIRATION:86400000}
auth.reset-token.expiration-minutes=${AUTH_RESET_TOKEN_EXPIRATION_MINUTES:60}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.file.name=logs/auth-service.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,httpexchanges
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.observations.key-values.application=${spring.application.name}
